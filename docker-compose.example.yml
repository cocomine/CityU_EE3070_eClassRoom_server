services:
  main:
    image: ghcr.io/cocomine/cityu_ee3070_eclassroom_server-vpn:master
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379
      - OPENROUTER_KEY=
      - S3_ENDPOINT=
      - S3_ACCESS_KEY_ID=
      - S3_SECRET_ACCESS_KEY=
      - S3_PUBLIC_URL=
      - LLM_MODEL=openai/gpt-5-mini
      - PORT=3000
    ports:
      - "3000:3000"
    networks:
      - apiNet
    depends_on:
      - redis

  redis:
    image: redis:latest
    restart: always
    networks:
      - apiNet

networks:
  apiNet:
    driver: bridge

volumes:
  redis-data:
    driver: local