openapi: 3.0.3
info:
  title: Task Generation API
  version: 1.0.0
  description: >
    Task-based LLM generation API (no conversation/history shown to users).
    Server uses a fixed System Prompt; each request provides a Task Prompt.
    LLM response is non-streaming (wait until fully complete).
    SSE is used ONLY to stream status updates (PENDING/GENERATING/DONE/ERROR/CANCELLED/STALE).
servers:
  - url: http://localhost:3000
    description: Local
  - url: https://api.example.com
    description: Production (example)

tags:
  - name: Tasks
    description: Task lifecycle (create, status stream, meta, result, cancel)
  - name: Questions
    description: Stored generated question by subject

paths:
  /v1/subjects/{subjectId}/tasks:
    post:
      tags: [Tasks]
      summary: Create a new task (generate one question)
      description: >
        Creates a task, enqueues it for background processing (BullMQ), and returns taskId.
        Uses clientTaskId for idempotency; if replayed, returns duplicated=true and same taskId.
      parameters:
        - $ref: '#/components/parameters/SubjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
            examples:
              example:
                value:
                  clientTaskId: "A0D2A6C7-6F45-4D5C-A0F3-0E6C5A7B7B33"
                  taskPrompt: "請生成一題關於二次方程的應用題，含答案與簡短解法"
                  options:
                    difficulty: "medium"
                    language: "zh-HK"
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTaskResponse'
              examples:
                created:
                  value:
                    taskId: "TID_NEW"
                    subjectId: "math"
                    status: "PENDING"
                    statusStreamUrl: "/v1/tasks/TID_NEW/status/stream"
                    resultUrl: "/v1/tasks/TID_NEW/result"
        '200':
          description: Idempotency hit (duplicate create)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateCreateTaskResponse'
              examples:
                duplicated:
                  value:
                    duplicated: true
                    taskId: "TID_NEW"
                    subjectId: "math"
                    status: "PENDING"
                    statusStreamUrl: "/v1/tasks/TID_NEW/status/stream"
                    resultUrl: "/v1/tasks/TID_NEW/result"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/tasks/{taskId}:
    get:
      tags: [Tasks]
      summary: Get task meta (status)
      description: >
        Returns current task status and timestamps. Useful for app relaunch/reconnect.
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task meta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskMetaResponse'
              examples:
                generating:
                  value:
                    taskId: "TID_NEW"
                    subjectId: "math"
                    status: "GENERATING"
                    createdAt: "2026-03-11T08:00:00.000Z"
                    startedAt: "2026-03-11T08:00:00.200Z"
                    finishedAt: null
                    errorMessage: null
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/tasks/{taskId}/status/stream:
    get:
      tags: [Tasks]
      summary: Task status SSE stream
      description: >
        SSE stream that emits ONLY status updates (no tokens/content).
        On connect, server should immediately emit the current status, then future changes.
        Recommended events:
        - event: status, data: {"taskId":"...","status":"PENDING|GENERATING|DONE|ERROR|CANCELLED|STALE", "resultUrl": "...optional..."}
        After DONE/ERROR/CANCELLED, server may close the stream.
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: SSE (text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                sse_example:
                  summary: SSE example
                  value: |
                    event: status
                    data: {"taskId":"TID_NEW","status":"PENDING"}

                    event: status
                    data: {"taskId":"TID_NEW","status":"GENERATING"}

                    event: status
                    data: {"taskId":"TID_NEW","status":"DONE","resultUrl":"/v1/tasks/TID_NEW/result"}
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/tasks/{taskId}/result:
    get:
      tags: [Tasks]
      summary: Get final generated question result
      description: >
        Returns the final question when DONE.
        If task is not finished yet, returns 202 Accepted with current status.
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task completed result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResultResponse'
              examples:
                done:
                  value:
                    taskId: "TID_NEW"
                    subjectId: "math"
                    status: "DONE"
                    question:
                      text: "（最終問題內容...）"
                      answer: "（答案...）"
                      explanation: "（簡短解法...）"
                    createdAt: "2026-03-11T08:00:00.000Z"
                    finishedAt: "2026-03-11T08:00:05.000Z"
        '202':
          description: Task not finished yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskNotReadyResponse'
              examples:
                generating:
                  value:
                    taskId: "TID_NEW"
                    subjectId: "math"
                    status: "GENERATING"
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/tasks/{taskId}/cancel:
    post:
      tags: [Tasks]
      summary: Cancel task
      description: >
        Requests cancellation. Server sets a cancel flag; worker should stop if possible,
        or discard result and mark CANCELLED.
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
            examples:
              empty:
                value: {}
      responses:
        '200':
          description: Cancel requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelTaskResponse'
              examples:
                ok:
                  value:
                    ok: true
                    taskId: "TID_NEW"
                    status: "CANCEL_REQUESTED"
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/subjects/{subjectId}/questions:
    get:
      tags: [Questions]
      summary: List stored generated question (optional)
      description: >
        Lists stored questions generated for a subject. This is optional and can be omitted if not needed.
      parameters:
        - $ref: '#/components/parameters/SubjectId'
        - name: limit
          in: query
          required: false
          description: Page size (default 20)
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: cursor
          in: query
          required: false
          description: Pagination cursor
          schema:
            type: string
        - name: order
          in: query
          required: false
          description: Sort order
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: List of stored question
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionListResponse'
              examples:
                example:
                  value:
                    subjectId: "math"
                    items:
                      - questionId: "QID1"
                        taskId: "TID1"
                        textPreview: "（問題前 60 字...）"
                        createdAt: "2026-03-11T08:00:05.000Z"
                    nextCursor: null
        '400':
          $ref: '#/components/responses/BadRequest'

components:
  parameters:
    SubjectId:
      name: subjectId
      in: path
      required: true
      description: Subject identifier
      schema:
        type: string
        minLength: 1
    TaskId:
      name: taskId
      in: path
      required: true
      description: Task identifier
      schema:
        type: string
        minLength: 1

  responses:
    BadRequest:
      description: Bad request (invalid parameters)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
          examples:
            example:
              value:
                error: "BAD_REQUEST"
                message: "Invalid request parameters."
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
          examples:
            example:
              value:
                error: "NOT_FOUND"
                message: "Resource not found."

  schemas:
    ISODateTime:
      type: string
      format: date-time
      description: ISO 8601 datetime string

    TaskStatus:
      type: string
      enum: [PENDING, GENERATING, DONE, ERROR, CANCELLED, STALE]
      description: Task lifecycle status

    StandardError:
      type: object
      additionalProperties: false
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
        detail:
          nullable: true

    CreateTaskRequest:
      type: object
      additionalProperties: false
      required: [clientTaskId, taskPrompt]
      properties:
        clientTaskId:
          type: string
          description: Client-generated UUID for idempotency
        taskPrompt:
          type: string
          description: Task prompt to generate one question
        options:
          type: object
          description: Optional structured options (difficulty, language, etc.)
          additionalProperties: true
          nullable: true

    CreateTaskResponse:
      type: object
      additionalProperties: false
      required: [taskId, subjectId, status, statusStreamUrl, resultUrl]
      properties:
        taskId:
          type: string
        subjectId:
          type: string
        status:
          $ref: '#/components/schemas/TaskStatus'
        statusStreamUrl:
          type: string
          description: Relative URL for SSE status stream
        resultUrl:
          type: string
          description: Relative URL for retrieving final result

    DuplicateCreateTaskResponse:
      type: object
      additionalProperties: false
      required: [duplicated, taskId, subjectId, status, statusStreamUrl, resultUrl]
      properties:
        duplicated:
          type: boolean
          enum: [true]
        taskId:
          type: string
        subjectId:
          type: string
        status:
          $ref: '#/components/schemas/TaskStatus'
        statusStreamUrl:
          type: string
        resultUrl:
          type: string

    TaskMetaResponse:
      type: object
      additionalProperties: false
      required: [taskId, subjectId, status, createdAt, startedAt, finishedAt, errorMessage]
      properties:
        taskId:
          type: string
        subjectId:
          type: string
        status:
          $ref: '#/components/schemas/TaskStatus'
        createdAt:
          $ref: '#/components/schemas/ISODateTime'
        startedAt:
          $ref: '#/components/schemas/ISODateTime'
          nullable: true
        finishedAt:
          $ref: '#/components/schemas/ISODateTime'
          nullable: true
        errorMessage:
          type: string
          nullable: true

    TaskNotReadyResponse:
      type: object
      additionalProperties: false
      required: [taskId, subjectId, status]
      properties:
        taskId:
          type: string
        subjectId:
          type: string
        status:
          $ref: '#/components/schemas/TaskStatus'

    QuestionPayload:
      type: object
      additionalProperties: false
      required: [text]
      properties:
        text:
          type: string
        answer:
          type: string
          nullable: true
        explanation:
          type: string
          nullable: true

    TaskResultResponse:
      type: object
      additionalProperties: false
      required: [taskId, subjectId, status, question, createdAt, finishedAt]
      properties:
        taskId:
          type: string
        subjectId:
          type: string
        status:
          $ref: '#/components/schemas/TaskStatus'
        question:
          $ref: '#/components/schemas/QuestionPayload'
        createdAt:
          $ref: '#/components/schemas/ISODateTime'
        finishedAt:
          $ref: '#/components/schemas/ISODateTime'

    CancelTaskResponse:
      type: object
      additionalProperties: false
      required: [ok, taskId, status]
      properties:
        ok:
          type: boolean
          enum: [true]
        taskId:
          type: string
        status:
          type: string
          enum: [CANCEL_REQUESTED]

    QuestionListItem:
      type: object
      additionalProperties: false
      required: [questionId, taskId, textPreview, createdAt]
      properties:
        questionId:
          type: string
        taskId:
          type: string
        textPreview:
          type: string
        createdAt:
          $ref: '#/components/schemas/ISODateTime'

    QuestionListResponse:
      type: object
      additionalProperties: false
      required: [subjectId, items, nextCursor]
      properties:
        subjectId:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/QuestionListItem'
        nextCursor:
          type: string
          nullable: true