openapi: 3.0.3
info:
  title: EE3070 Project Server API
  version: 1.0.0
  description: |
    OpenAPI 規格依據目前 `src/routes` 的實際實作整理。
    主要功能包含課程、檔案上傳、題目產生任務、取消與狀態串流 (SSE)。
servers:
  - url: http://localhost:3001
    description: Local development
tags:
  - name: System
  - name: Classroom
  - name: Courses
  - name: Files
  - name: Questions
  - name: Replies

paths:
  /:
    get:
      tags: [ System ]
      summary: Home
      operationId: getHome
      responses:
        '200':
          description: Home message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeResponse'
              example:
                code: 200
                message: "This is home page! Use '/course' or '/classroom'"

  /ping:
    get:
      tags: [ System ]
      summary: Health check
      operationId: getPing
      responses:
        '200':
          description: Pong
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingResponse'
              example:
                code: 200
                message: pong

  /classroom:
    get:
      tags: [ Classroom ]
      summary: Get classroom environment data
      operationId: getClassroom
      responses:
        '200':
          description: Classroom data placeholder
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassroomResponse'
              example:
                code: 200
                message: This is classroom environment data!

  /course:
    get:
      tags: [ Courses ]
      summary: List courses
      operationId: listCourses
      responses:
        '200':
          description: Course list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseListResponse'
              example:
                code: 200
                message: Course list retrieved successfully
                data:
                  - courseId: 546644f3-9632-42b1-a916-79c1657f9938
                    name: Test Course2
                    digitId: "000001"
                  - courseId: 9b58e4d1-4ae3-4f60-94bd-04e63fc6be44
                    name: Test Course1
                    digitId: "000002"
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [ Courses ]
      summary: Create course
      operationId: createCourse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseCreateRequest'
            example:
              name: Introduction to Biology
      responses:
        '200':
          description: Course created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseCreateResponse'
              example:
                code: 200
                message: Course created successfully
                data:
                  courseId: 9b58e4d1-4ae3-4f60-94bd-04e63fc6be44
                  digitId: "000002"
                  name: Test Course1
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /course/{courseId}:
    get:
      tags: [ Courses ]
      summary: Get course info
      operationId: getCourse
      parameters:
        - $ref: '#/components/parameters/CourseIdPath'
      responses:
        '200':
          description: Course info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseInfoResponse'
              example:
                code: 200
                message: Course info retrieved successfully
                data:
                  courseId: 546644f3-9632-42b1-a916-79c1657f9938
                  name: Test Course2
                  digitId: "000001"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /course/{courseId}/file:
    get:
      tags: [ Files ]
      summary: List uploaded files in a course
      operationId: listCourseFiles
      parameters:
        - $ref: '#/components/parameters/CourseIdPath'
      responses:
        '200':
          description: File metadata list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [ Files ]
      summary: Upload file to course
      operationId: uploadCourseFile
      parameters:
        - $ref: '#/components/parameters/CourseIdPath'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [ file ]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '400':
          description: Invalid payload or multer/file validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                no_file:
                  value:
                    code: 400
                    message: No file uploaded
                invalid_type:
                  value:
                    code: 400
                    message: Does not support audio!
        '404':
          $ref: '#/components/responses/NotFound'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /course/{courseId}/file/{fileId}:
    delete:
      tags: [ Files ]
      summary: Delete file
      operationId: deleteCourseFile
      parameters:
        - $ref: '#/components/parameters/CourseIdPath'
        - $ref: '#/components/parameters/FileIdPath'
      responses:
        '200':
          description: File deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDeleteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /course/{courseId}/question:
    get:
      tags: [ Questions ]
      summary: List question metadata in a course
      operationId: listCourseQuestions
      parameters:
        - $ref: '#/components/parameters/CourseIdPath'
        - $ref: '#/components/parameters/QuestionVisibilityFilterQuery'
        - $ref: '#/components/parameters/QuestionStatusFilterQuery'
      responses:
        '200':
          description: Question metadata list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionListResponse'
              examples:
                list_all:
                  value:
                    code: 200
                    message: All question meta get successfully.
                    data:
                      - questionId: 7144c3a8-61ea-432a-8724-568eec435832
                        courseId: 546644f3-9632-42b1-a916-79c1657f9938
                        title: Key Java Concepts
                        prompt: 請集中L1的資料￼
                        status: DONE
                        visibility: 0
                        createAt: 2026-03-27T19:31:21.045Z
                        startAt: 2026-03-27T19:31:21.045Z
                        finishedAt: 2026-03-27T19:31:21.045Z
                        updateAt: 2026-03-27T19:31:21.045Z
                        errorMessage: ""
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [ Questions ]
      summary: Create question generation task
      operationId: createQuestionTask
      parameters:
        - $ref: '#/components/parameters/CourseIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionCreateRequest'
            example:
              clientTaskId: e0eb839a-b682-44e5-8e06-85a4a5ef16f1
              prompt: Please generate any 4 understanding-check questions.
      responses:
        '201':
          description: New question generation task enqueued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionCreateResponse'
        '202':
          description: Idempotency hit; existing task id returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionCreateDuplicateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /course/{courseId}/question/replied:
    get:
      tags: [ Replies ]
      summary: List answered questions for a student in this course
      operationId: listRepliedQuestions
      parameters:
        - $ref: '#/components/parameters/CourseIdPath'
        - $ref: '#/components/parameters/XEIDHeader'
      responses:
        '200':
          description: Answered questions fetched successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepliedQuestionListResponse'
              examples:
                answered:
                  value:
                    code: 200
                    message: Answered questions fetched successfully.
                    data:
                      - replyId: 1440f78a-1786-4769-853e-5668b575fd4e
                        questionId: 31341d78-bb6c-43a6-9851-be0392c882cd
                        courseId: 546644f3-9632-42b1-a916-79c1657f9938
                        subQuestionId: 1
                        eid: aaa2
                        content: 學生作答內容...
                        status: DONE
                        score: 40
                        createAt: 2026-04-02T20:58:05.501Z
                        startAt: 2026-04-02T20:58:05.501Z
                        finishedAt: 2026-04-02T20:58:05.501Z
                        updateAt: 2026-04-02T20:58:05.501Z
                        errorMessage: ""
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Not found (no answered questions or course not found)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                no_answer:
                  value:
                    code: 404
                    message: No questions answered.
                no_course:
                  value:
                    code: 404
                    message: No course found.

  /course/{courseId}/question/{questionId}:
    get:
      tags: [ Questions ]
      summary: Get question result or current status
      operationId: getQuestion
      parameters:
        - $ref: '#/components/parameters/CourseIdPath'
        - $ref: '#/components/parameters/QuestionIdPath'
      responses:
        '200':
          description: Question generation finished (DONE)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionDoneResponse'
              example:
                code: 200
                message: Question 7144c3a8-61ea-432a-8724-568eec435832 is DONE.
                data:
                  meta:
                    questionId: 7144c3a8-61ea-432a-8724-568eec435832
                    courseId: 546644f3-9632-42b1-a916-79c1657f9938
                    status: DONE
                    title: Key Java Concepts
                    prompt: 請集中L1的資料￼
                    visibility: 0
                    createAt: 2026-03-27T19:31:21.045Z
                    startAt: 2026-03-27T19:31:21.045Z
                    finishedAt: 2026-03-27T19:31:21.045Z
                    updateAt: 2026-03-27T19:31:21.045Z
                    errorMessage: ""
                  questions:
                    - question: Explain how Java achieves its write once, run anywhere characteristic.
                      keypoint:
                        - JVM interprets bytecode.
                        - Bytecode runs on any platform with a JVM.
                      expectedAnswer: JVM lets the same Java bytecode run across different systems.
                    - question: In Object-Oriented Programming, a class serves as a blueprint for objects.
                      keypoint:
                        - Class is a template.
                        - Object is an instance created from class.
                      expectedAnswer: A class defines structure and behavior, and objects are runtime instances.
        '202':
          description: Question not ready yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionNotReadyResponse'
              example:
                code: 202
                message: Question 123e4567-e89b-12d3-a456-426614174000 is not ready yet.
                data:
                  meta:
                    questionId: 123e4567-e89b-12d3-a456-426614174000
                    courseId: 546644f3-9632-42b1-a916-79c1657f9938
                    status: GENERATING
                    title: New Question (123e4567)
                    prompt: ""
                    visibility: 0
                    createAt: 2026-04-02T19:36:13.000Z
                    startAt: 2026-04-02T19:36:14.000Z
                    finishedAt: ""
                    updateAt: 2026-04-02T19:36:14.000Z
                    errorMessage: ""
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [ Questions ]
      summary: Update question visibility (public/private)
      operationId: updateQuestionVisibility
      parameters:
        - $ref: '#/components/parameters/CourseIdPath'
        - $ref: '#/components/parameters/QuestionIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionVisibilityUpdateRequest'
            example:
              visibility: public
      responses:
        '200':
          description: Visibility updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionVisibilityUpdateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Question status is not DONE
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionStatusConflictResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags: [ Questions ]
      summary: Delete question
      operationId: deleteQuestion
      parameters:
        - $ref: '#/components/parameters/CourseIdPath'
        - $ref: '#/components/parameters/QuestionIdPath'
      responses:
        '200':
          description: Question deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionDeleteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Question is still processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionStatusConflictResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /course/{courseId}/question/{questionId}/cancel:
    post:
      tags: [ Questions ]
      summary: Cancel question generation
      operationId: cancelQuestion
      parameters:
        - $ref: '#/components/parameters/CourseIdPath'
        - $ref: '#/components/parameters/QuestionIdPath'
      responses:
        '202':
          description: Cancellation requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionCancelAcceptedResponse'
        '200':
          description: |
            Current implementation returns HTTP 200 with `code: 410`
            when question is already in terminal status (DONE/ERROR/CANCELLED/STALE).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionCancelTerminalResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /course/{courseId}/question/{questionId}/reply:
    get:
      tags: [ Replies ]
      summary: List all replies for a question
      operationId: listQuestionReplies
      parameters:
        - $ref: '#/components/parameters/CourseIdPath'
        - $ref: '#/components/parameters/QuestionIdPath'
        - $ref: '#/components/parameters/ReplyStatusFilterQuery'
      responses:
        '200':
          description: Reply metadata list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplyListResponse'
              example:
                code: 200
                message: All reply meta get successfully.
                data:
                  - replyId: 1440f78a-1786-4769-853e-5668b575fd4e
                    questionId: 31341d78-bb6c-43a6-9851-be0392c882cd
                    courseId: 546644f3-9632-42b1-a916-79c1657f9938
                    subQuestionId: 1
                    eid: aaa2
                    content: 學生作答內容...
                    status: DONE
                    score: 40
                    createAt: 2026-04-02T18:15:13.216Z
                    startAt: 2026-04-02T18:15:13.216Z
                    finishedAt: 2026-04-02T18:15:13.216Z
                    updateAt: 2026-04-02T18:15:13.216Z
                    errorMessage: ""
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [ Replies ]
      summary: Submit student reply for a sub-question
      operationId: createQuestionReply
      parameters:
        - $ref: '#/components/parameters/CourseIdPath'
        - $ref: '#/components/parameters/QuestionIdPath'
        - $ref: '#/components/parameters/XEIDHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplyCreateRequest'
            example:
              subQuestionId: 2
              content: 在 Java 中，double 轉 int 屬於 narrowing conversion，所以要顯式 cast。
              clientTaskId: 7f4d2812-14f0-4a53-b750-6a8f40fbb5c5
              overwrite: false
      responses:
        '200':
          description: Reply accepted and queued for marking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplyCreateResponse'
              example:
                code: 200
                message: Reply question successfully.
                data:
                  replyId: 4eea0591-162a-426d-b655-e0ad4eb11516
                  status: PENDING
        '202':
          description: Idempotency hit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplyCreateDuplicateResponse'
              example:
                code: 202
                message: Request already receive
                data:
                  replyId: 4eea0591-162a-426d-b655-e0ad4eb11516
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict (already replied or DB uniqueness conflict)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                already_replied:
                  value:
                    code: 409
                    message: "Conflict: You have already replied to this question. Please set overwrite to true if you want to overwrite the reply."
                duplicated_record:
                  value:
                    code: 409
                    message: "Conflict: This reply or related record already exists."
        '500':
          $ref: '#/components/responses/InternalServerError'

  /course/{courseId}/question/{questionId}/reply/{replyId}:
    get:
      tags: [ Replies ]
      summary: Get reply marking result or current status
      operationId: getQuestionReply
      parameters:
        - $ref: '#/components/parameters/CourseIdPath'
        - $ref: '#/components/parameters/QuestionIdPath'
        - $ref: '#/components/parameters/ReplyIdPath'
      responses:
        '200':
          description: Reply marking finished (DONE)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplyDoneResponse'
              example:
                code: 200
                message: Reply 1440f78a-1786-4769-853e-5668b575fd4e is DONE.
                data:
                  meta:
                    questionId: 31341d78-bb6c-43a6-9851-be0392c882cd
                    subQuestionId: 1
                    finishedAt: 2026-04-04T08:30:06.732Z
                    content: 在 Java 中，double 轉成 int 這種情況屬於縮小轉型...
                    eid: aaa2
                    courseId: 546644f3-9632-42b1-a916-79c1657f9938
                    status: DONE
                    score: 40
                    updateAt: 2026-04-04T08:30:06.732Z
                    createAt: 2026-04-04T08:30:06.732Z
                    startAt: 2026-04-04T08:30:06.732Z
                    replyId: 1440f78a-1786-4769-853e-5668b575fd4e
                    errorMessage: ""
                  result:
                    score: 40
                    understanding_level: partial
                    key_point_feedback:
                      - point: Distinguish primitive (e.g., `int`) vs. object (e.g., `String`) types.
                        status: missing
                        comment: The answer does not distinguish between primitive and object types.
                    one_sentence_summary: The student understands explicit casting for narrowing conversion.
                    next_step: Review widening conversion and compile-time error behavior.
        '202':
          description: Reply is still being marked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplyNotReadyResponse'
              example:
                code: 202
                message: Reply 1440f78a-1786-4769-853e-5668b575fd4e is not ready yet.
                data:
                  meta:
                    questionId: 31341d78-bb6c-43a6-9851-be0392c882cd
                    subQuestionId: 1
                    finishedAt: ""
                    content: 在 Java 中，double 轉成 int...
                    eid: aaa2
                    courseId: 546644f3-9632-42b1-a916-79c1657f9938
                    status: GENERATING
                    score: null
                    updateAt: 2026-04-04T09:05:07.326Z
                    createAt: 2026-04-04T09:03:46.503Z
                    startAt: 2026-04-04T09:05:07.326Z
                    replyId: 1440f78a-1786-4769-853e-5668b575fd4e
                    errorMessage: ""
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Reply not found in this question
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_in_question:
                  value:
                    code: 404
                    message: No reply found in question 1440f78a-1786-4769-853e-5668b575fd40.
                missing_meta:
                  value:
                    code: 404
                    message: Reply 1440f78a-1786-4769-853e-5668b575fd4e not found.
    patch:
      tags: [ Replies ]
      summary: Retry a reply marking task
      operationId: retryQuestionReply
      parameters:
        - $ref: '#/components/parameters/CourseIdPath'
        - $ref: '#/components/parameters/QuestionIdPath'
        - $ref: '#/components/parameters/ReplyIdPath'
      responses:
        '202':
          description: Retry accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplyRetryAcceptedResponse'
              examples:
                queued:
                  value:
                    code: 202
                    message: Reply 1440f78a-1786-4769-853e-5668b575fd4e marking task queued for retry.
                    data:
                      status: PENDING
                retrying:
                  value:
                    code: 202
                    message: Reply 1440f78a-1786-4769-853e-5668b575fd4e marking task retrying.
                    data:
                      status: PENDING
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Reply not found in this question
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 404
                message: No reply found in question 1440f78a-1786-4769-853e-5668b575fd40.
        '409':
          description: Reply is still in PENDING/GENERATING and cannot be retried
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplyRetryConflictResponse'
              example:
                code: 409
                message: Reply 1440f78a-1786-4769-853e-5668b575fd4e is currently GENERATING. Cannot retry.
                data:
                  meta:
                    finishedAt: ""
                    content: 在 Java 中，double 轉成 int 這種情況屬於縮小轉型...
                    eid: aaa2
                    courseId: 546644f3-9632-42b1-a916-79c1657f9938
                    status: GENERATING
                    score: null
                    subQuestionId: 1
                    updateAt: 2026-04-04T09:05:07.326Z
                    createAt: 2026-04-04T09:03:46.503Z
                    startAt: 2026-04-04T09:05:07.326Z
                    replyId: 1440f78a-1786-4769-853e-5668b575fd4e
                    errorMessage: ""
                    questionId: 31341d78-bb6c-43a6-9851-be0392c882cd
        '500':
          description: Failed to reset data and retry marking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: 500
                message: Failed to retry marking.

  /course/{courseId}/question/{questionId}/reply/{replyId}/stream:
    get:
      tags: [ Replies ]
      summary: Stream reply status by SSE
      description: |
        Emits `event: status` with payload:
        `{"replyId":"...","status":"PENDING|GENERATING|DONE|ERROR|CANCELLED|STALE"}`.
        When status is DONE, it may emit `event: delta` with marking result payload.
      operationId: streamReplyStatus
      parameters:
        - $ref: '#/components/parameters/CourseIdPath'
        - $ref: '#/components/parameters/QuestionIdPath'
        - $ref: '#/components/parameters/ReplyIdPath'
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: status
                data: {"replyId":"1440f78a-1786-4769-853e-5668b575fd4e","status":"PENDING"}

                event: status
                data: {"replyId":"1440f78a-1786-4769-853e-5668b575fd4e","status":"GENERATING"}

                event: delta
                data: {"score":40,"understanding_level":"partial","key_point_feedback":[{"point":"...","status":"full","comment":"..."}],"one_sentence_summary":"...","next_step":"..."}

                event: status
                data: {"replyId":"1440f78a-1786-4769-853e-5668b575fd4e","status":"DONE"}
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /course/{courseId}/question/{questionId}/stream:
    get:
      tags: [ Questions ]
      summary: Stream question status by SSE
      description: |
        Emits `event: status` with payload:
        `{"questionId":"...","status":"PENDING|GENERATING|DONE|ERROR|CANCELLED|STALE"}`.
        When status is DONE and title exists, it also emits `event: delta` with
        `{"questionId":"...","title":"..."}`.
      operationId: streamQuestionStatus
      parameters:
        - $ref: '#/components/parameters/CourseIdPath'
        - $ref: '#/components/parameters/QuestionIdPath'
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
              example: |
                event: status
                data: {"questionId":"829c0cf0-791c-43f4-9e55-dc4d27f68d63","status":"PENDING"}

                event: status
                data: {"questionId":"829c0cf0-791c-43f4-9e55-dc4d27f68d63","status":"GENERATING"}

                event: delta
                data: {"questionId":"829c0cf0-791c-43f4-9e55-dc4d27f68d63","title":"Understanding Java Exceptions"}

                event: status
                data: {"questionId":"829c0cf0-791c-43f4-9e55-dc4d27f68d63","status":"DONE"}
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    CourseIdPath:
      name: courseId
      in: path
      required: true
      description: Course UUID
      schema:
        type: string
        format: uuid
    FileIdPath:
      name: fileId
      in: path
      required: true
      description: File UUID
      schema:
        type: string
        format: uuid
    QuestionIdPath:
      name: questionId
      in: path
      required: true
      description: Question UUID
      schema:
        type: string
        format: uuid
    ReplyIdPath:
      name: replyId
      in: path
      required: true
      description: Reply UUID
      schema:
        type: string
        format: uuid
    QuestionVisibilityFilterQuery:
      name: visibility
      in: query
      required: false
      description: |
        Filter by visibility. Current implementation stores private/public as `0/1`.
      schema:
        type: string
        enum: [ '0', '1' ]
    QuestionStatusFilterQuery:
      name: status
      in: query
      required: false
      description: |
        Filter by status. Multiple statuses are joined by `:`.
        Example: `PENDING:GENERATING` or `DONE`.
      schema:
        type: string
        pattern: '^(PENDING|GENERATING|DONE|ERROR|CANCELLED|STALE)(:(PENDING|GENERATING|DONE|ERROR|CANCELLED|STALE))*$'
    ReplyStatusFilterQuery:
      name: status
      in: query
      required: false
      description: Filter replies by status. Multiple statuses are joined by `:`.
      schema:
        type: string
        pattern: '^(PENDING|GENERATING|DONE|ERROR|CANCELLED|STALE)(:(PENDING|GENERATING|DONE|ERROR|CANCELLED|STALE))*$'
    XEIDHeader:
      name: X-EID
      in: header
      required: true
      description: Student identifier. Only alphanumeric characters are accepted.
      schema:
        type: string
        pattern: '^[0-9a-zA-Z]+$'

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 400
            message: Invalid request
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 404
            message: Resource not found
    UnsupportedMediaType:
      description: Unsupported media type
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 415
            message: Content-Type must be multipart/form-data
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 403
            message: Question is not public, you can't reply.
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 500
            message: Internal server error

  schemas:
    ErrorResponse:
      type: object
      required: [ code, message ]
      properties:
        code:
          type: integer
        message:
          type: string

    HomeResponse:
      type: object
      required: [ code, message ]
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string

    PingResponse:
      type: object
      required: [ code, message ]
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: pong

    ClassroomResponse:
      type: object
      required: [ code, message ]
      properties:
        code:
          type: integer
        message:
          type: string

    CourseItem:
      type: object
      required: [ name, digitId ]
      properties:
        id:
          type: string
          format: uuid
          description: Legacy field (may still appear in old cached records)
        courseId:
          type: string
          format: uuid
        name:
          type: string
        digitId:
          type: string
          pattern: '^\d{6}$'

    CourseCreateRequest:
      type: object
      required: [ name ]
      properties:
        name:
          type: string
          minLength: 1

    CourseListResponse:
      type: object
      required: [ code, message, data ]
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: Course list retrieved successfully
        data:
          type: array
          items:
            $ref: '#/components/schemas/CourseItem'

    CourseCreateResponse:
      type: object
      required: [ code, message, data ]
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: Course created successfully
        data:
          type: object
          required: [ courseId, digitId, name ]
          properties:
            courseId:
              type: string
              format: uuid
            digitId:
              type: string
              pattern: '^\d{6}$'
            name:
              type: string

    CourseInfoResponse:
      type: object
      required: [ code, message, data ]
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: Course info retrieved successfully
        data:
          $ref: '#/components/schemas/CourseItem'

    FileMeta:
      type: object
      properties:
        fileId:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        mime:
          type: string
        filename:
          type: string
        sha256:
          type: string
        size:
          oneOf:
            - type: integer
            - type: string

    FileListResponse:
      type: object
      required: [ code, message, data ]
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: All file meta get successfully.
        data:
          type: array
          items:
            $ref: '#/components/schemas/FileMeta'

    FileUploadResponse:
      type: object
      required: [ code, message, data ]
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: File uploaded successfully
        data:
          type: object
          required: [ fileId, courseId, mime, filename, sha256 ]
          properties:
            fileId:
              type: string
              format: uuid
            courseId:
              type: string
              format: uuid
            mime:
              type: string
            filename:
              type: string
            sha256:
              type: string

    FileDeleteResponse:
      type: object
      required: [ code, message ]
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: File ec4bf3cf-4bf5-4bf1-8d70-3303190f5b74 is deleted.

    QuestionStatus:
      type: string
      enum: [ PENDING, GENERATING, DONE, ERROR, CANCELLED, STALE ]

    QuestionMeta:
      type: object
      properties:
        visibility:
          type: integer
          nullable: true
          enum: [ 0, 1 ]
        createAt:
          type: string
          description: ISO-8601 string or empty string
        finishedAt:
          type: string
          description: ISO-8601 string or empty string
        errorMessage:
          type: string
        questionId:
          type: string
          format: uuid
        updateAt:
          type: string
        startAt:
          type: string
          description: ISO-8601 string or empty string
        title:
          type: string
        prompt:
          type: string
        status:
          $ref: '#/components/schemas/QuestionStatus'
        courseId:
          type: string
          format: uuid
      required:
        - questionId
        - courseId
        - status

    QuestionListResponse:
      type: object
      required: [ code, message, data ]
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: All question meta get successfully.
        data:
          type: array
          items:
            $ref: '#/components/schemas/QuestionMeta'

    QuestionCreateRequest:
      type: object
      required: [ clientTaskId ]
      properties:
