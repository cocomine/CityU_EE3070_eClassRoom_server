          type: string
          format: uuid
        prompt:
          type: string
          nullable: true

    QuestionCreateResponse:
      type: object
      required: [ code, message, data ]
      properties:
        code:
          type: integer
          example: 201
        message:
          type: string
          example: Question generate request enqueued.
        data:
          type: object
          required: [ questionId, title, status ]
          properties:
            questionId:
              type: string
              format: uuid
            title:
              type: string
            status:
